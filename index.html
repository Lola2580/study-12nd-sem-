<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2nd Semester Study Hub</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-animation">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="container">

        <!-- Splash Screen -->
        <section id="splash-screen">

            <div class="glass-card splash-card">

                <div class="semester-badge">
                    <i class="fas fa-graduation-cap"></i>
                    2nd Semester
                </div>

                <h1 class="main-title">
                    Study Hub
                </h1>

                <p class="subtitle">
                    Modern QnA Learning Portal
                </p>

                <button id="startBtn" class="start-btn">
                    <i class="fas fa-play"></i>
                    Start Learning
                </button>

            </div>

        </section>

        <!-- Main Panel -->
        <section id="main-panel">

            <!-- Header -->
            <div class="top-header">

                <div class="logo-box">
                    <i class="fas fa-book-open"></i>
                    <span>2nd Semester</span>
                </div>

                <div class="counter-box">
                    <i class="fas fa-list"></i>
                    Qn:
                    <span id="currentQnNum">0</span>
                    /
                    <span id="totalQnNum">0</span>
                </div>

            </div>

            <!-- Subject Buttons -->
            <div class="subject-section">

                <button class="subject-btn active"
                    data-subject="major3">

                    <i class="fas fa-microchip"></i>
                    Major 3
                </button>

                <button class="subject-btn"
                    data-subject="major4">

                    <i class="fas fa-code"></i>
                    Major 4
                </button>

            </div>

            <!-- Paper Name -->
            <div class="paper-box">

                <h2 id="paperName">
                    Major 3 · DSA
                </h2>

            </div>

            <!-- Search Box -->
            <div class="search-box">

                <i class="fas fa-search"></i>

                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search Question..."
                >

            </div>

            <!-- Questions Area -->
            <div id="qnaScroll" class="qna-scroll">

                <!-- Dynamic Questions Here -->

            </div>

            <!-- Footer -->
            <div class="footer-note">

                <i class="fas fa-angle-down"></i>
                Click Arrow To View Answer
                <i class="fas fa-angle-down"></i>

            </div>

        </section>

    </div>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
