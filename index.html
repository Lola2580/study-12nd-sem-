<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2nd Semester Study Hub V4</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-animation">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>
    <section id="splash-screen">
        <div class="splash-card glass">
            <div class="semester-badge">
                <i class="fas fa-graduation-cap"></i>
                2nd Semester
            </div>
            <h1 class="main-title">
                Study Hub
            </h1>
            <p class="subtitle">
              Smart Learning Portal<br><b style="color:;"> chutio</b>
            </p>
            <div class="splash-stats">
                <span><i class="fas fa-book"></i> 45+ Q&A</span>
                <span><i class="fas fa-file-alt"></i> 2 Subjects</span>
                <span><i class="fas fa-download"></i> PDF Export</span>
            </div>
            <button id="startBtn" class="start-btn">
                <i class="fas fa-play"></i>
                Start Learning
            </button>
        </div>
    </section>
    <section id="main-panel">

        <div class="top-header">
            <div class="logo-box">
                <i class="fas fa-book-open"></i>
                2nd Semester
            </div>
            <div class="header-actions">
                <button id="themeToggle" class="theme-btn">
                    <i class="fas fa-moon"></i>
                </button>
                <button id="ideaBtn" class="idea-btn">
                    <i class="fas fa-lightbulb"></i>
                    IDEA
                </button>
                <div class="counter-box">
                    <i class="fas fa-list-ol"></i>
                    <span id="currentQnNum">0</span>
                    /
                    <span id="totalQnNum">0</span>
                </div>
            </div>
        </div>

        <div class="subject-section">
            <button class="subject-btn active" data-subject="major3">
                <i class="fas fa-microchip"></i>
                Major 3
            </button>
            <button class="subject-btn" data-subject="major4">
                <i class="fas fa-code"></i>
                Major 4
            </button>
        </div>

        <div class="paper-box">
            <h2 id="paperName">
                Major 3 · DSA
            </h2>
            <span class="question-count" id="questionCount">0 Questions</span>
        </div>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search Questions...">
            <button id="clearSearch" class="clear-search">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">
                <i class="fas fa-list"></i> All
            </button>
            <button class="filter-btn" data-filter="answered">
                <i class="fas fa-check-circle"></i> Done
            </button>
            <button class="filter-btn" data-filter="unanswered">
                <i class="fas fa-circle"></i> Pending
            </button>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div id="qnaScroll" class="qna-scroll"></div>

    </section>

    <div id="fullscreenModal" class="fullscreen-modal">
        <div class="fullscreen-content">
            <button id="closeFullscreen" class="close-fullscreen">
                <i class="fas fa-times"></i>
            </button>
            <div id="fullscreenBody"></div>
        </div>
    </div>
    <div id="passwordModal" class="password-modal">
        <button id="passwordBack" class="password-back">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="password-card glass">
            <h2><i class="fas fa-lock"></i> Enter Password</h2>
            <p class="password-hint">Enter the secret key to access notes</p>
            <input type="password" id="passwordInput" placeholder="Password">
            <button id="passwordSubmit">
                <i class="fas fa-unlock"></i> GET
            </button>
            <div class="password-error" id="passwordError">Wrong password!</div>
        </div>
    </div>
    <div id="notesPanel">
        <div class="notes-header">
            <h2><i class="fas fa-sticky-note"></i> Study Notes</h2>
            <button id="closeNotes"><i class="fas fa-times"></i></button>
        </div>
        <div class="notes-buttons">
            <button id="notesMajor3"><i class="fas fa-microchip"></i> Major 3</button>
            <button id="notesMajor4"><i class="fas fa-code"></i> Major 4</button>
        </div>
        <div class="pdf-actions">
            <button id="downloadPdfBtn">
                <i class="fas fa-file-pdf"></i>
                Download PDF
            </button>
            <button id="printNotesBtn">
                <i class="fas fa-print"></i>
                Print Notes
            </button>
        </div>
        <div id="notesContainer"></div>
    </div>
    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Done!</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
